<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registraion Form</title>
    
    <style>
    fieldset{
        background-color: skyblue;
        width: 500px;
        margin: 20px;
        padding: 10px;
    

        
    }
   
    </style>
</head>

<body>
    <center>
    <h2>Student Registraion Form</h2>

    
        <fieldset>



            <form>

                <label for="name">Name:</label><br>
                <input type="text" id="name" name="name" required><br><br>

                <label for="dob">Date of Birth:</label><br>
                <input type="date" id="dob" name="dob"><br><br>

                <label>Gender:</label><br>
                <input type="radio" id="male" name="gender" value="Male">
                <label for="male">Male</label>

                <input type="radio" id="female" name="gender" value="Female">
                <label for="female">Female</label>

                <input type="radio" id="other" name="gender" value="Other">
                <label for="other">Other</label><br><br>

                <label>Technologies Known:</label><br>
                <input type="checkbox" id="html" name="technology" value="HTML">
                <label for="html">HTML</label><br>

                <input type="checkbox" id="css" name="technology" value="CSS">
                <label for="css">CSS</label><br>

                <input type="checkbox" id="javascript" name="technology" value="JavaScript">
                <label for="javascript">JavaScript</label><br>

                <input type="checkbox" id="python" name="technology" value="Python">
                <label for="python">Python</label><br><br>

                <label for="address">Address:</label><br>
                <textarea id="address" name="address" rows="4" cols="30"
                    placeholder="Enter your address"></textarea><br><br>

                <label for="country">Country:</label><br>
                <select id="country" name="country">
                    <option value="">--Select Country--</option>
                    <option value="India">India</option>
                    <option value="USA">USA</option>
                    <option value="UK">UK</option>
                    <option value="Canada">Canada</option>
                    <option value="Australia">Australia</option>
                </select><br><br>

                <input type="submit" value="Submit">
                <input type="reset" value="Reset">

            </form>

        </fieldset>

    </center>
</body>

</html>
